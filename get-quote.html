<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get a Quote — Webora Studio</title>

  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

<header class="header">
  <div class="container nav">
    <div class="logo">Webora<span>Studio</span></div>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>Get a Quote</h1>
    <p>Tell us about your project.</p>
  </div>
</section>

<section class="section">
  <div class="container form-container">
    <form id="quoteForm" class="form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <input type="text" name="budget" placeholder="Estimated Budget">
      <textarea name="details" placeholder="Project Details" required></textarea>
      <button type="submit" class="btn primary">Request Quote</button>
      <p class="form-status"></p>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="container footer-bottom">
    <p>© 2026 Webora Studio.</p>
  </div>
</footer>

<script src="/js/main.js"></script>
<script src="/js/email.js"></script>
</body>
</html>
